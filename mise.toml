[tools]
air = "latest"
go = "latest"
golangci-lint = "latest"
sqlc = "latest"

[env]
_.file = [".env"]

[tasks.run]
description = "Start the development server with hot reloading"
run = "air"

[tasks.sqlc]
description = "Generate type-safe Go code from SQL"
run = "sqlc generate"

[tasks.lint]
description = "Run linter"
run = "golangci-lint run ./..."

[tasks.swagger]
description = "Run swagger"
run = "swag fmt && swag init -g ./cmd/api/main.go"

[tasks.test]
description = "Run unit tests"
run = "go test ./... -v"

[tasks."test:integration"]
description = "Run integration tests (requires docker stack: postgres, redis, garage)"
run = "go test -tags=integration ./... -v"

[tasks.migrateup]
description = "Run database migrations up and bootstrap platform admin"
run = "go run ./cmd/api migrate up"

[tasks.migratedown]
description = "Rollback all database migrations"
run = "go run ./cmd/api migrate down"

[tasks.composeup]
description = "Start docker-compose services"
run = "docker-compose -f ./infra/docker-compose.yml up -d"

[tasks.composedown]
description = "Stop and tear down docker-compose services with volumes"
run = "docker-compose -f ./infra/docker-compose.yml down -v"

[tasks.composestop]
description = "Stop docker-compose services"
run = "docker-compose stop"

[tasks.cleantemp]
description = "Delete all temp uploads from Garage"
run = "aws s3 rm s3://$S3_BUCKET/temp/ --recursive --endpoint-url $S3_ENDPOINT"
